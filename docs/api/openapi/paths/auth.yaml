login:
  post:
    tags:
      - Auth
    summary: Login to get access token
    x-postman-event:
      - listen: test
        script:
          type: text/javascript
          exec:
            - |
              var jsonData = pm.response.json();
              if (jsonData.success && jsonData.data && jsonData.data.access_token) {
                  // Save to Collection variable (robust, works without environment)
                  pm.collectionVariables.set("auth_token", jsonData.data.access_token);
                  pm.collectionVariables.set("bearerToken", jsonData.data.access_token);
                  
                  // Save to Environment variable (as backup)
                  pm.environment.set("auth_token", jsonData.data.access_token);
                  pm.environment.set("bearerToken", jsonData.data.access_token);
                  
                  console.log("Token saved to variables: auth_token & bearerToken");
              }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/auth.yaml#/LoginRequest'
    responses:
      '200':
        description: Login successful
        headers:
          Set-Cookie:
            description: refresh_token cookie (HttpOnly)
            schema:
              type: string
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/base_response.yaml#/BaseResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/LoginResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/base_response.yaml#/ErrorResponse'

refresh:
  post:
    tags:
      - Auth
    summary: Refresh access token using refresh token cookie
    responses:
      '200':
        description: Refresh successful
        headers:
          Set-Cookie:
            description: Rotated refresh_token cookie
            schema:
              type: string
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/base_response.yaml#/BaseResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/LoginResponse'
      '401':
        description: Refresh token missing or invalid
        content:
          application/json:
            schema:
              $ref: '../components/schemas/base_response.yaml#/ErrorResponse'

me:
  get:
    tags:
      - Auth
    summary: Get current authenticated user profile
    security:
      - bearerAuth: []
    responses:
      '200':
        description: Profile retrieved successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/base_response.yaml#/BaseResponse'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/auth.yaml#/UserResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../components/schemas/base_response.yaml#/ErrorResponse'
